name = "alex-fitness-webhook"
main = "webhook-handler.js"
compatibility_date = "2024-01-01"

# KV namespace for challenges storage
# Create with: wrangler kv namespace create CHALLENGES_KV
# Then paste the ID below
[[kv_namespaces]]
binding = "CHALLENGES_KV"
id = "128fbaa0a7244943b73ac25f22bf203c"

# All secrets set via Cloudflare Dashboard or: wrangler secret put <NAME>
# SQUARE_APPLICATION_ID, SQUARE_ACCESS_TOKEN, SQUARE_WEBHOOK_SIGNATURE_KEY
# TRAINERIZE_TRAINER_GROUP_ID, TRAINERIZE_API_KEY, TRAINERIZE_COACH_USER_ID
#
# Plaintext config below — these are NOT secrets (Square service IDs and
# Trainerize type IDs are both public-by-design, visible in URLs and UI),
# so version-controlling them in wrangler.toml is safe and gives us atomic
# deploys + change history.
[vars]
# Square service variation → Trainerize appointment type (reverse-sync direction)
TZ_TYPE_BY_SERVICE = '{"UTPNPXXQA2R3WTKRQWXE6CBG":2845441,"66QDZG33XW3F62HR63P6VF5G":8116657,"DFDGPQ56NTEWU4TX2WQBU7TR":8116656,"EFAXK3SOJJPNK2G3XK3MHXZI":5850677}'
# Square service → user tag applied to TZ profile when this booking type is taken
TZ_TAG_BY_SERVICE = '{"UTPNPXXQA2R3WTKRQWXE6CBG":"Initial Consultation"}'
# Trainerize type → Square service variation (forward-sync direction)
SQ_SERVICE_BY_TZ_TYPE = '{"8116657":"66QDZG33XW3F62HR63P6VF5G","8116656":"DFDGPQ56NTEWU4TX2WQBU7TR","10915844":"DFDGPQ56NTEWU4TX2WQBU7TR","5850677":"EFAXK3SOJJPNK2G3XK3MHXZI"}'

# Cron triggers:
#   */15 * * * *  → every 15 min: Trainerize→Square appointment sync + credit deduction
#   0 4 * * *     → daily 04:00 UTC: people-sync 'link' phase (build linkage, persist KV)
#   5 4 * * *     → daily 04:05 UTC: people-sync 'reconcile' phase (TZ↔SQ field updates)
#   10 4 * * *    → daily 04:10 UTC: people-sync 'create' phase (create missing TZ/SQ)
# Phase splitting (link/reconcile/create) keeps each invocation under the
# Cloudflare Workers subrequest cap during backlog convergence. Minutes 5/10
# avoid colliding with */15 (which fires at :00, :15, :30, :45).
[triggers]
crons = ["*/15 * * * *", "0 4 * * *", "5 4 * * *", "10 4 * * *"]

# Square Webhook Events to subscribe to:
# (configure these in Square Dashboard > Developer > Webhooks > Add endpoint)
#
# booking.created         → new booking → syncs to Trainerize calendar
# booking.updated         → booking changed/cancelled → updates Trainerize
# subscription.updated    → renewal success, canceled, paused
# payment.completed       → payment went through
# payment.failed          → card declined
# order.updated           → order completed → assigns session credits
# invoice.payment_made    → invoice paid (including auto-invoices)
# invoice.payment_failed  → invoice payment failed
# invoice.updated         → invoice status changed (overdue, etc.)
# customer.updated        → profile changes → syncs to Trainerize
# customer.created        → (logged, no action needed — created on first booking)
# customer.deleted        → (logged only)
# catalog.version.updated → refreshes cached session pricing in KV
