name = "alex-fitness-webhook"
main = "webhook-handler.js"
compatibility_date = "2024-01-01"

# KV namespace for challenges storage
# Create with: wrangler kv namespace create CHALLENGES_KV
# Then paste the ID below
[[kv_namespaces]]
binding = "CHALLENGES_KV"
id = "128fbaa0a7244943b73ac25f22bf203c"

# All secrets set via Cloudflare Dashboard or: wrangler secret put <NAME>
# SQUARE_APPLICATION_ID, SQUARE_ACCESS_TOKEN, SQUARE_WEBHOOK_SIGNATURE_KEY
# TRAINERIZE_TRAINER_GROUP_ID, TRAINERIZE_API_KEY, TRAINERIZE_COACH_USER_ID
[vars]

# Cron triggers:
#   */15 * * * *  → every 15 min: Trainerize→Square appointment sync + credit deduction
#   0 4 * * *     → daily 04:00 UTC: bidirectional people-sync (TZ↔SQ identity reconcile)
[triggers]
crons = ["*/15 * * * *", "0 4 * * *"]

# Square Webhook Events to subscribe to:
# (configure these in Square Dashboard > Developer > Webhooks > Add endpoint)
#
# booking.created         → new booking → syncs to Trainerize calendar
# booking.updated         → booking changed/cancelled → updates Trainerize
# subscription.updated    → renewal success, canceled, paused
# payment.completed       → payment went through
# payment.failed          → card declined
# order.updated           → order completed → assigns session credits
# invoice.payment_made    → invoice paid (including auto-invoices)
# invoice.payment_failed  → invoice payment failed
# invoice.updated         → invoice status changed (overdue, etc.)
# customer.updated        → profile changes → syncs to Trainerize
# customer.created        → (logged, no action needed — created on first booking)
# customer.deleted        → (logged only)
# catalog.version.updated → refreshes cached session pricing in KV
